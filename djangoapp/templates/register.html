{% extends 'base.html' %}
{% block title %}Register - Telecom Sentiment Analysis{% endblock %}

{% block content %}
<style>
    /* Centering container full height of viewport */
    .register-page {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Form container styling */
    .form-container {
        width: 100%;
        max-width: 500px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.55);
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
        padding: 30px;
        color: #fff;
        backdrop-filter: blur(6px);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
        color: #fff;
    }

    /* Form alignment styles */
    .form-group-aligned {
        display: flex;
        align-items: center;
        margin-bottom: 1.2rem;
    }

    .form-group-aligned label {
        width: 120px;
        color: #fff;
        margin-right: 15px;
        text-align: left;
    }

    .form-group-aligned .form-control {
        flex-grow: 1;
        height: 45px;
        padding: 0 15px;
        border-radius: 8px;
        border: none;
    }

    /* Address box specific styling */
    .address-aligned {
        display: flex;
        align-items: flex-start;
        margin-bottom: 1.2rem;
    }

    .address-aligned label {
        width: 120px;
        color: #fff;
        margin-right: 15px;
        text-align: left;
        padding-top: 10px;
    }

    .address-aligned textarea.form-control {
        flex-grow: 1;
        height: 100px;
        resize: none;
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
    }

    /* Button styling */
    .btn-primary {
        width: 100%;
        background-color: #0078d7;
        border: none;
        font-weight: 600;
        padding: 12px;
        border-radius: 8px;
        transition: 0.3s ease-in-out;
    }

    .btn-primary:hover {
        background-color: #005bb5;
        transform: scale(1.03);
    }

    /* Link styling */
    .text-center a.text-info {
        background-color: blueviolet;
        padding: 2px 6px;
        border-radius: 4px;
        color: #fff !important;
        text-decoration: none;
    }

    .text-center a.text-info:hover {
        background-color: #6a1b9a;
    }

</style>

<div class="register-page">
    <div class="form-container">
        <h2>Register</h2>

        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-success text-center">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group-aligned">
                <label for="name">Full Name:</label>
                <input type="text" name="name" id="name" placeholder="Full Name" class="form-control" required>
            </div>

            <div class="form-group-aligned">
                <label for="phone">Phone Number:</label>
                <input type="tel" name="phone" id="phone" placeholder="Phone Number" class="form-control" required>
            </div>

            <div class="form-group-aligned">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Email" class="form-control" required>
            </div>

            <div class="address-aligned">
                <label for="address">Address:</label>
                <textarea name="address" id="address" placeholder="Address" rows="3" class="form-control" required></textarea>
            </div>

            <div class="form-group-aligned">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" placeholder="Username" class="form-control" required>
            </div>

            <div class="form-group-aligned">
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Password" class="form-control" required>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>

        <p class="text-center mt-3 mb-0" style="color: #fff;">
            Already have an account? <a href="/login/" class="text-info">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
