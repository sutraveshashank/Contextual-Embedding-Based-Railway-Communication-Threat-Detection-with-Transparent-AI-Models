<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Contextual Embedding-Based Railway Communication Threat Detection with Transparent AI Models{% endblock %}</title>
  
  {% load static %}

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.5.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  
  <style>
    /* Make body full height and flex column to stick footer */
    html, body {
        height: 100%;
        margin: 0;
        font-family: 'Times New Roman', Times, serif;
    }

    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: url("{% static 'images/security.png' %}") no-repeat center center fixed;
        background-size: cover;
        color: #fff;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: -1;
    }

    /* Header */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #0078d7;
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
    }

    header a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
    }

    /* Main content grows to push footer down */
    main {
        flex: 1;
        padding: 40px 20px;
    }
    .buttons{
      font-size: 30px;
    }

    /* Footer */
    footer {
        background: #222;
        color: #aaa;
        text-align: center;
        
        padding: 10px;
    }
    footer p{
      font-size: 20px;
    }
  </style>
  
  {% block extra_head %}{% endblock %}
</head>

<body>
  <!-- Header -->
  <header>
    <h1>Contextual Embedding-Based Railway Communication Threat Detection with Transparent AI Models</h1>
    <nav class="buttons">
      <a href="/">Home</a>
      <a href="/register/">Register</a>
      <a href="/login/">Login</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2025 SAK Informatics</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.5.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
